<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block" rel="stylesheet">

<body>

<button class="gearBtn" id="btnSet" aria-label="Settings">
  <span class="msym" style="font-size:20px">settings</span>
</button>

<div class="app">

  <aside class="left">
    <div class="clock">
      <div class="time" id="clkTime"></div>
      <div class="date" id="clkDate"></div>
    </div>
    <div class="wx" id="wxBar" onclick="openWeatherSheet()"></div>
    <section class="card choreCard" id="todayCard"></section>
  </aside>

  <main class="right">
    <section id="monthPane" class="card calCard">
      <div class="calNav">
        <h2 id="calTitle"></h2>
        <button id="btnCalToday">Today</button>
        <button id="btnPrev" aria-label="Previous month"><span class="msym" style="font-size:20px">chevron_left</span></button>
        <button id="btnNext" aria-label="Next month"><span class="msym" style="font-size:20px">chevron_right</span></button>
      </div>
      <div class="wdRow">
        <div class="sun">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="sat">Sat</div>
      </div>
      <div class="cal" id="calGrid"></div>
      <div class="legend" id="calLegend"></div>
    </section>
    <section class="card moneyCard" id="moneyCard" onclick="openAccountSheet()"></section>
  </main>

</div>

<div id="sleep"><div id="sleepClk"></div></div>
<div id="sheetWrap"><div id="sheet"></div></div>
<dialog id="dlg"></dialog>

<script type="module" src="src/main.js"></script>
</body>
</html>
