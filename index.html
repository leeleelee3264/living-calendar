<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>리빙 캘린더 · Living Calendar</title>
<style>
  :root{
    --bg:#faf6f0; --card:#ffffff; --ink:#3a3540; --sub:#9a8fa3;
    --line:#f0e9e2; --accent:#ffb26b; --cellbg:#faf8f5; --cellToday:#fff7ee;
    --shadow:0 2px 12px rgba(90,70,50,.06); --sbthumb:#dccfc0;
  }
  body.dark{
    --bg:#15171c; --card:#1e2129; --ink:#e8ebf0; --sub:#98a0ac;
    --line:#3a424e; --accent:#e6a15c; --cellbg:#1a1d23; --cellToday:#2c2820;
    --shadow:0 2px 14px rgba(0,0,0,.35); --sbthumb:#3f4855;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;
    scrollbar-width:thin; scrollbar-color:var(--sbthumb) transparent;}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--sbthumb); border-radius:99px;
    border:2px solid transparent; background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--sub);}
  html{font-size:16px;}
  @media(min-width:860px){ html{font-size:17px;} }
  @media(min-width:1150px){ html{font-size:19px;} }
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
    transition:background .4s,color .4s;}

  .app{display:grid; grid-template-columns:1fr; gap:14px;
    max-width:560px; margin:0 auto; padding:14px 14px 40px;
    transition:transform 2s ease;}

  /* night screen-off: black overlay with a faint wandering clock (burn-in protection) */
  #sleep{position:fixed; inset:0; background:#000; z-index:90; display:none;
    align-items:center; justify-content:center; cursor:pointer;}
  #sleep.on{display:flex;}
  #sleepClk{font-size:4.2rem; font-weight:700; color:#35353d; letter-spacing:.04em;
    transition:transform 3s ease;}
  @media(min-width:860px){
    .app{grid-template-columns:minmax(360px,2fr) 3fr; max-width:1480px;
      min-height:100vh; min-height:100dvh;
      align-content:center; align-items:center;
      column-gap:28px; padding:24px 30px;}
  }

  .topRow{display:flex; align-items:center; gap:6px; margin-bottom:10px;}
  .topRow h1{font-size:.85rem; margin:0; flex:1; color:var(--sub); font-weight:700; letter-spacing:.02em;}
  .hbtn{border:1px solid var(--line); background:var(--card); border-radius:11px;
    padding:7px 11px; font-size:.85rem; color:var(--ink); cursor:pointer;}

  .clock{padding:4px 4px 12px;}
  .clock .time{font-size:3.6rem; font-weight:800; letter-spacing:.02em; line-height:1;}
  .clock .date{font-size:1.05rem; color:var(--sub); margin-top:6px; font-weight:600;}

  .card{background:var(--card); border-radius:18px; padding:16px; box-shadow:var(--shadow);
    transition:background .4s;}
  .cardHead{display:flex; align-items:baseline; gap:8px;}
  .cardHead h2{font-size:1rem; margin:0; flex:1;}
  .prog{font-size:.9rem; color:var(--sub); font-weight:700;}
  .pbar{height:8px; border-radius:99px; background:var(--line); margin:10px 0 4px; overflow:hidden;}
  .pbar i{display:block; height:100%; background:linear-gradient(90deg,#7bc47f,#a8d5ab);
    border-radius:99px; transition:width .3s;}

  .chore{display:flex; align-items:center; gap:12px; padding:13px 2px;
    border-bottom:1px dashed var(--line); cursor:pointer;}
  .chore:last-of-type{border-bottom:none;}
  .chore input{width:25px; height:25px; accent-color:#7bc47f; flex:none; cursor:pointer;}
  .chore .emoji{font-size:1.4rem; flex:none;}
  .cname{flex:1; font-size:1rem; line-height:1.25;}
  .cname small{display:block; color:var(--sub); font-size:.72rem; margin-top:1px; font-weight:600;}
  .chore.done .cname{text-decoration:line-through; opacity:.4;}
  .chip{font-size:.78rem; padding:4px 11px; border-radius:999px; border:1.5px solid;
    white-space:nowrap; flex:none; font-weight:700;}
  .chip.both{background:linear-gradient(90deg,#6d8dff1e,#ff92ac1e);
    color:#9a8aa8; border-color:#d5c8e0;}
  .chip.tap{cursor:pointer;}
  .hint{font-size:.72rem; color:var(--sub); margin-top:10px; line-height:1.5;}

  .tabRow{display:flex; align-items:center; gap:6px; margin-bottom:12px;}
  .tab{border:1px solid var(--line); background:var(--card); border-radius:11px;
    padding:8px 16px; font-size:.9rem; color:var(--sub); cursor:pointer; font-weight:700;}
  .tab.on{background:var(--accent); border-color:var(--accent); color:#4d3418;}
  .tabRow .sp{flex:1;}

  /* week strip */
  .weekWrap{overflow-x:auto; margin:0 -4px; padding:0 4px;}
  .week{display:grid; grid-template-columns:repeat(7,1fr); gap:7px; min-width:530px;}
  .wcol{background:var(--cellbg); border-radius:13px; padding:7px 6px 8px; min-height:120px;
    cursor:pointer; border:2px solid transparent;}
  .wcol.today{border-color:var(--accent); background:var(--cellToday);}
  .whead{text-align:center; font-size:.7rem; font-weight:700; color:var(--sub); margin-bottom:5px;}
  .whead b{display:block; font-size:1.05rem; color:var(--ink);}
  .whead.sun, .whead.sun b{color:#e06666;}
  .whead.sat, .whead.sat b{color:#6a86e0;}
  .wItem{border-radius:9px; padding:4px 6px; font-size:.68rem; line-height:1.25; margin-top:4px;
    border-left:3px solid transparent;}
  .wItem small{display:block; opacity:.85; font-weight:800; margin-top:1px;}
  .wItem.done{opacity:.38; text-decoration:line-through;}

  /* upcoming */
  .uRow{display:flex; align-items:center; gap:11px; padding:11px 2px;
    border-bottom:1px dashed var(--line);}
  .uRow:last-child{border-bottom:none;}
  .uRow .emoji{font-size:1.25rem; flex:none;}
  .dday{font-weight:800; font-size:.82rem; color:#e8964f; flex:none; min-width:3.2em; text-align:right;}

  /* month calendar */
  .calNav{display:flex; align-items:center; gap:6px; margin-bottom:10px;}
  .calNav h2{flex:1; font-size:1.02rem; margin:0;}
  .calNav button{border:1px solid var(--line); background:var(--card); border-radius:10px;
    padding:5px 12px; font-size:.9rem; cursor:pointer; color:var(--ink);}
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .wdh{text-align:center; font-size:.7rem; color:var(--sub); font-weight:700; padding:3px 0;}
  .wdh.sun{color:#e06666;} .wdh.sat{color:#6a86e0;}
  .cell{min-height:58px; border-radius:10px; background:var(--cellbg); padding:4px 3px 3px;
    font-size:.72rem; cursor:pointer; border:2px solid transparent;}
  .cell.empty{background:transparent; cursor:default;}
  .cell.today{border-color:var(--accent); background:var(--cellToday);}
  .dn{font-weight:700; color:var(--sub);}
  .dn.sun{color:#e06666;} .dn.sat{color:#6a86e0;}
  .minis{display:flex; flex-wrap:wrap; gap:2px; margin-top:2px;}
  .mini{font-size:.84rem; line-height:1.25; padding:0 1px 2px; background-size:100% 3px !important;}
  .legend{margin-top:12px; border-top:1px dashed var(--line); padding-top:10px;
    display:flex; flex-wrap:wrap; gap:6px 12px; font-size:.74rem; color:var(--sub);}
  .legend .li{display:flex; align-items:center; gap:4px;}
  .note{font-size:.72rem; color:var(--sub); margin-top:10px; line-height:1.5;}

  .rule{padding:10px 2px; border-bottom:1px dashed var(--line); font-size:.9rem; line-height:1.55;}
  .rule:last-child{border-bottom:none;}
  .rule b{display:block; margin-bottom:2px;}
  .rule span{color:var(--sub);}

  /* bottom sheet */
  #sheetWrap{position:fixed; inset:0; background:rgba(20,16,10,.45); opacity:0;
    pointer-events:none; transition:opacity .2s; z-index:50;}
  #sheetWrap.open{opacity:1; pointer-events:auto;}
  #sheet{position:absolute; left:0; right:0; bottom:0; background:var(--card);
    border-radius:22px 22px 0 0; padding:18px 20px calc(22px + env(safe-area-inset-bottom));
    max-width:640px; margin:0 auto; transform:translateY(100%); transition:transform .22s;
    max-height:78vh; overflow-y:auto;}
  #sheetWrap.open #sheet{transform:translateY(0);}
  #sheet h3{margin:0 0 4px; font-size:1.05rem;}

  /* dialogs */
  dialog{border:none; border-radius:18px; padding:0; width:min(92vw,460px);
    max-height:86vh; color:var(--ink); background:var(--card);}
  dialog::backdrop{background:rgba(20,16,10,.48);}
  .dlgIn{padding:18px;}
  .dlgIn h2{margin:0 0 6px; font-size:1.1rem;}
  .sec{font-size:.76rem; font-weight:800; color:#b07aa6; margin:16px 0 4px;
    text-transform:uppercase; letter-spacing:.03em;}
  .frow{display:flex; align-items:center; gap:8px; padding:5px 0; font-size:.87rem; flex-wrap:wrap;}
  .frow label{flex:1; min-width:90px; color:var(--sub);}
  .frow select,.frow input[type=date],.frow input[type=text]{
    border:1px solid var(--line); border-radius:9px; padding:6px 8px; font-size:.86rem;
    background:var(--card); color:var(--ink);}
  .frow input[type=text]{width:110px;}
  .frow input[type=color]{border:none; width:30px; height:30px; padding:0; background:none;}
  .secCard{border:1px solid var(--line); border-radius:14px; padding:2px 12px 10px; margin-top:12px;}
  .secCard .sec{margin-top:12px;}
  .subNote{font-size:.76rem; color:var(--sub); margin:4px 0 0; line-height:1.5;}
  .seg{display:inline-flex; border:1.5px solid var(--line); border-radius:11px; overflow:hidden; flex:none;}
  .seg button{border:none; background:transparent; padding:7px 12px; font-size:.83rem;
    color:var(--sub); cursor:pointer; font-family:inherit;}
  .seg button.on{background:var(--accent); color:#4d3418; font-weight:800;}
  .dayb{border:1.5px solid var(--line); background:transparent; border-radius:9px; padding:6px 9px;
    font-size:.82rem; color:var(--sub); cursor:pointer; font-family:inherit;}
  .dayb.on{background:#ffb26b33; border-color:var(--accent); color:var(--ink); font-weight:800;}
  button.chip{cursor:pointer; font-family:inherit;}
  .dlgBtns{display:flex; gap:8px; margin-top:16px;}
  .dlgBtns button{flex:1; border-radius:12px; padding:10px; font-size:.92rem; cursor:pointer;
    border:1px solid var(--line); background:var(--card); color:var(--ink);}
  .dlgBtns .primary{background:var(--accent); border-color:var(--accent); font-weight:700; color:#4d3418;}
  .resetLink{display:block; text-align:center; margin:12px auto 0; font-size:.76rem;
    color:#c07777; background:none; border:none; cursor:pointer;}
  .help{font-size:.72rem; color:var(--sub); line-height:1.45; margin:2px 0 0;}

  /* wide screens (wall tablet): scale up so content fills the height */
  @media(min-width:860px){
    .clock{padding:8px 4px 20px;}
    .clock .time{font-size:4.6rem;}
    .clock .date{font-size:1.15rem;}
    .chore{padding:15px 2px;}
    .wcol{min-height:max(160px, 26vh);}
    .whead b{font-size:1.15rem;}
    .wItem{font-size:.72rem; padding:5px 7px;}
    .uRow{padding:13px 2px;}
    #upCard{margin-top:16px !important;}
    .wx{padding:13px 16px;}
    .wx .wxIcon{font-size:1.7rem;}
    .wx .wxTemp{font-size:1.15rem;}
  }

  /* weather bar (left column, under clock) */
  .wx{display:flex; align-items:center; gap:11px; margin:0 0 12px; padding:11px 14px;
    background:var(--card); border-radius:14px; box-shadow:var(--shadow); cursor:pointer;
    transition:background .4s;}
  .wx .wxIcon{font-size:1.5rem; flex:none; line-height:1;}
  .wx .wxTemp{font-size:1.05rem; font-weight:800; flex:none;}
  .wx .wxTemp .wxMin{font-weight:600; color:var(--sub); margin-left:4px;}
  .wx .wxDesc{font-size:.9rem; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .wx .wxDesc.rain{color:var(--accent); font-weight:700;}
  .wx .wxMore{margin-left:auto; font-size:.82rem; color:var(--sub); flex:none;}
  /* hourly sheet */
  .hourly{display:flex; flex-direction:column;}
  .hDate{font-size:.76rem; font-weight:800; color:var(--accent); letter-spacing:.03em;
    margin:12px 2px 2px; padding-top:8px; border-top:1px solid var(--line);}
  .hDate:first-child{margin-top:2px; padding-top:0; border-top:none;}
  .hRow{display:flex; align-items:center; gap:10px; padding:9px 6px; border-bottom:1px dashed var(--line);}
  .hRow:last-child{border-bottom:none;}
  .hRow.now{background:var(--cellToday); border-radius:9px;}
  .hRow .hH{width:3.6em; font-weight:700; font-size:.9rem; flex:none;}
  .hRow .hIco{font-size:1.15rem; width:1.5em; text-align:center; flex:none;}
  .hRow .hDesc{flex:1; font-size:.88rem; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hRow .hPop{font-size:.8rem; color:#5e9be0; flex:none;}
  .hRow .hT{font-weight:800; font-size:.95rem; min-width:2.6em; text-align:right; flex:none;}
</style>
</head>
<body>
<div class="app">

  <aside class="left">
    <div class="topRow">
      <span style="flex:1"></span>
      <button class="hbtn" id="btnLang">EN</button>
      <button class="hbtn" id="btnFull">⛶</button>
      <button class="hbtn" id="btnSet">⚙️</button>
    </div>
    <div class="clock">
      <div class="time" id="clkTime"></div>
      <div class="date" id="clkDate"></div>
    </div>
    <div class="wx" id="wxBar" onclick="openWeatherSheet()"></div>
    <section class="card" id="todayCard"></section>
    <div class="hint" id="footNote"></div>
  </aside>

  <main class="right">
    <section id="monthPane" class="card">
      <div class="calNav">
        <h2 id="calTitle"></h2>
        <button id="btnCalToday"></button>
        <button id="btnPrev">‹</button>
        <button id="btnNext">›</button>
      </div>
      <div class="cal" id="calGrid"></div>
      <div class="legend" id="calLegend"></div>
      <div class="note" id="calNote"></div>
    </section>
  </main>

</div>

<div id="sleep"><div id="sleepClk"></div></div>
<div id="sheetWrap"><div id="sheet"></div></div>
<dialog id="dlg"></dialog>

<script>

const DEFAULTS = {
  lang:'ko',
  theme:'auto',
  darkStart:21, darkEnd:7,
  sleep:{on:true, start:0, end:6},
  view:'week',

  daily:{trashBathroom:'B', trashRecycle:'A', vacuum:'A', makeBed:'both'},
  laundry:{days:[2,4,6], owner:'B'},
  mop:{day:0, mode:'rotate', first:'B'},
  bathroomClean:{day:6, startWeek:0, first:'A'},
  bedding:{day:6, startWeek:1},
  fridge:{nth:1, day:0, first:'B'},
};

function deepMerge(base, over){
  for(const k in over){
    if(over[k] && typeof over[k]==='object' && !Array.isArray(over[k])
       && base[k] && typeof base[k]==='object' && !Array.isArray(base[k])){
      deepMerge(base[k], over[k]);
    } else { base[k] = over[k]; }
  }
  return base;
}
function loadSettings(){
  try{
    const raw = JSON.parse(localStorage.getItem('chores-settings-v2') || '{}');
    return deepMerge(JSON.parse(JSON.stringify(DEFAULTS)), raw);
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULTS)); }
}
let S = loadSettings();
function saveSettings(){ localStorage.setItem('chores-settings-v2', JSON.stringify(S)); }

let DONE = {};
try{ DONE = JSON.parse(localStorage.getItem('chores-done-v1') || '{}'); }catch(e){}
function persistDone(){ localStorage.setItem('chores-done-v1', JSON.stringify(DONE)); }

try{ OVR = JSON.parse(localStorage.getItem('chores-ovr-v1') || '{}'); }catch(e){}

/* ---------- date helpers ---------- */
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseYMD(s){ const p = s.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
function mondayOf(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - (x.getDay()+6)%7);
  return x;
}
function mod(n,m){ return ((n%m)+m)%m; }
function weekIndex(d){ return Math.round((mondayOf(d) - mondayOf(parseYMD(S.anchor))) / (7*DAY)); }
function monthIndex(d){ const a = parseYMD(S.anchor); return (d.getFullYear()-a.getFullYear())*12 + (d.getMonth()-a.getMonth()); }
function nthWeekday(y, m, nth, wd){
  const first = new Date(y, m, 1);
  return new Date(y, m, 1 + mod(wd - first.getDay(), 7) + (nth-1)*7);
}
function pick(firstId, idx){
  const order = firstId==='A' ? ['A','B'] : ['B','A'];
  return order[mod(idx, 2)];
}
function t(key){ return STR[key][S.lang]; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){
  if(S.lang==='ko') return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WD_KO[d.getDay()]})`;
  return `${WD_EN[d.getDay()]}, ${MON_EN[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtShort(d){
  if(S.lang==='ko') return `${d.getMonth()+1}/${d.getDate()} (${WD_KO[d.getDay()]})`;
  return `${WD_EN[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
}

/* ---------- schedule engine ---------- */
function choresFor(d){
  const list = [];
  const wd = d.getDay();
  const wi = weekIndex(d);

  list.push({id:'trashBathroom', who:S.daily.trashBathroom});
  list.push({id:'trashRecycle',  who:S.daily.trashRecycle});
  list.push({id:'vacuum',        who:S.daily.vacuum});
  list.push({id:'makeBed',       who:S.daily.makeBed});

  if(S.laundry.days.includes(wd)) list.push({id:'laundry', who:S.laundry.owner});

  if(wd === S.mop.day){
    const who = S.mop.mode==='fixed' ? S.mop.first : pick(S.mop.first, wi);
    list.push({id:'mop', who});
  }
  const bc = S.bathroomClean;
  if(wd === bc.day && mod(wi,2) === bc.startWeek){
    list.push({id:'bathroomClean', who:pick(bc.first, Math.floor((wi - bc.startWeek)/2))});
  }
  const bd = S.bedding;
  if(wd === bd.day && mod(wi,2) === bd.startWeek) list.push({id:'bedding', who:'both'});

  const ds = ymd(d);
  const fr = S.fridge;
  if(ds === ymd(nthWeekday(d.getFullYear(), d.getMonth(), fr.nth, fr.day)))
    list.push({id:'fridge', who:pick(fr.first, monthIndex(d))});

  // per-day owner override (tap-to-swap)
  for(const c of list){
    c.base = c.who;
    const o = OVR[ds+'|'+c.id];
    if(o && c.who !== 'both') c.who = o;
  }
  return list;
}

function choreRow(c, ds){
  const done = !!DONE[ds+'|'+c.id];
  const ch = CHORES[c.id];
  const swapped = c.who !== c.base;
  const tap = c.who==='both' ? '' : `onclick="swapWho(event,'${ds}','${c.id}')"`;
  const p = c.who==='both' ? null : S.people[c.who];
  const chip = c.who==='both'
    ? `<span class="chip both">${t('together')}</span>`
    : `<span class="chip tap" ${tap} style="background:${p.color}1e;color:${p.color};border-color:${p.color}66">${swapped?t('swapped')+' ':''}${esc(p.name)}</span>`;
  return `<label class="chore ${done?'done':''}">
    <input type="checkbox" ${done?'checked':''} onchange="toggleDone('${ds}','${c.id}')">
    <span class="emoji">${ch.emoji}</span>
    <span class="cname">${ch[S.lang]}<small>${ch.freq[S.lang]}</small></span>
    ${chip}
  </label>`;
}

function inHourRange(h, start, end){
  return start<=end ? (h>=start && h<end) : (h>=start || h<end);
}

}
/* burn-in protection: night screen-off overlay + slow pixel shift */
let sleepPeekUntil = 0;
function applySleep(){
  const n = new Date();
  const active = S.sleep.on && inHourRange(n.getHours(), S.sleep.start, S.sleep.end)
    && Date.now() > sleepPeekUntil;
  $('#sleep').classList.toggle('on', active);
  if(active){
    $('#sleepClk').textContent =
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    const k = Math.floor(Date.now()/60000);   // 시계 위치도 1분마다 이동
    $('#sleepClk').style.transform = `translate(${(k*37)%160-80}px, ${(k*53)%200-100}px)`;

}
function applyShift(){
  const k = Math.floor(Date.now()/300000);    // 5분마다 화면 전체 1~2px 이동

/* ---------- weather (Open-Meteo · Seoul · no API key) ---------- */
const WX_LAT = 37.5665, WX_LON = 126.9780;
let WX = null;
try{ WX = JSON.parse(localStorage.getItem('chores-weather-v2') || 'null'); }catch(e){}

/* 지금 시각(정시)부터 앞으로 24시간 구간을 잘라 반환 */
function nowStamp(){ const n = new Date(); return ymd(n)+'T'+String(n.getHours()).padStart(2,'0')+':00'; }
function wx24(){
  if(!WX || !WX.hours || !WX.hours.length) return null;
  const s = nowStamp();
  let i = WX.hours.findIndex(x => x.t >= s);
  if(i < 0) i = 0;
  return WX.hours.slice(i, i+24);
}

/* WMO weather code → [emoji, ko, en, isPrecip] */
function wxInfo(c){
  const P=true, N=false;
  const M={
    0:['☀️','맑음','Clear',N], 1:['🌤️','대체로 맑음','Mostly clear',N],
    2:['⛅','구름 조금','Partly cloudy',N], 3:['☁️','흐림','Overcast',N],
    45:['🌫️','안개','Fog',N], 48:['🌫️','서리 안개','Rime fog',N],
    51:['🌦️','약한 이슬비','Light drizzle',P], 53:['🌦️','이슬비','Drizzle',P], 55:['🌦️','짙은 이슬비','Dense drizzle',P],
    56:['🌧️','어는 이슬비','Freezing drizzle',P], 57:['🌧️','어는 이슬비','Freezing drizzle',P],
    61:['🌧️','약한 비','Light rain',P], 63:['🌧️','비','Rain',P], 65:['🌧️','강한 비','Heavy rain',P],
    66:['🌧️','어는 비','Freezing rain',P], 67:['🌧️','어는 비','Freezing rain',P],
    71:['🌨️','약한 눈','Light snow',P], 73:['🌨️','눈','Snow',P], 75:['🌨️','강한 눈','Heavy snow',P],
    77:['🌨️','싸락눈','Snow grains',P],
    80:['🌦️','약한 소나기','Light showers',P], 81:['🌧️','소나기','Showers',P], 82:['⛈️','강한 소나기','Heavy showers',P],
    85:['🌨️','소낙눈','Snow showers',P], 86:['🌨️','강한 소낙눈','Heavy snow showers',P],
    95:['⛈️','뇌우','Thunderstorm',P], 96:['⛈️','우박 뇌우','Thunder w/ hail',P], 99:['⛈️','강한 우박 뇌우','Severe thunder',P],
  };
  const e = M[c] || ['❓','—','—',N];
  return {emoji:e[0], ko:e[1], en:e[2], precip:e[3]};
}
/* 대표 날씨 = "궂은 날씨 우선": 구간 중 비/눈이 한 번이라도 있으면 가장 심한 것, 없으면 지금 날씨 */
function repWeather(win){
  const sev = c =>
    c>=95 ? 5 : ((c>=71&&c<=77)||c===85||c===86) ? 4 :
    ((c>=61&&c<=67)||(c>=80&&c<=82)) ? 3 : (c>=51&&c<=57) ? 2 : 0;
  let worst = null;
  for(const x of win){ if(sev(x.code)>0 && (!worst || sev(x.code)>sev(worst.code))) worst = x; }
  if(worst) return worst.code;
  return win[0] ? win[0].code : 0;
}
async function fetchWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}`
      + `&timezone=Asia%2FSeoul&forecast_days=2`
      + `&hourly=weather_code,temperature_2m,precipitation_probability`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('http '+r.status);
    const j = await r.json();
    const hours = j.hourly.time.map((tm,i)=>({
      t: tm,                    // "2026-07-05T14:00"
      date: tm.slice(0,10),     // "2026-07-05"
      h: Number(tm.slice(11,13)),
      code: j.hourly.weather_code[i],
      temp: Math.round(j.hourly.temperature_2m[i]),
      pop: j.hourly.precipitation_probability ? j.hourly.precipitation_probability[i] : null,
    }));
    WX = { fetchedAt: nowStamp(), hours };
    localStorage.setItem('chores-weather-v2', JSON.stringify(WX));
  }catch(e){ /* keep last cached WX */ }
  renderWeather();
  if(sheetMode==='weather') renderSheet();
}
function renderWeather(){
  const el = $('#wxBar');
  if(!el) return;
  const win = wx24();
  if(!win){ el.innerHTML = `<span class="wxDesc">${S.lang==='ko'?'날씨 불러오는 중…':'Loading weather…'}</span>`; return; }
  const temps = win.map(x=>x.temp);
  const w = wxInfo(repWeather(win));
  el.innerHTML =
    `<span class="wxIcon">${w.emoji}</span>`
    + `<span class="wxTemp">${Math.max(...temps)}°<span class="wxMin">/ ${Math.min(...temps)}°</span></span>`
    + `<span class="wxDesc ${w.precip?'rain':''}">${w[S.lang]}</span>`
    + `<span class="wxMore">${S.lang==='ko'?'24시간':'24h'} ›</span>`;
}
function wxDateLabel(ds){
  const d = parseYMD(ds);
  return S.lang==='ko'
    ? `${d.getMonth()+1}월 ${d.getDate()}일 (${WD_KO[d.getDay()]})`
    : `${WD_EN[d.getDay()]}, ${MON_EN[d.getMonth()]} ${d.getDate()}`;
}
function renderWeatherSheet(){
  const title = S.lang==='ko' ? '앞으로 24시간 · 서울' : 'Next 24 hours · Seoul';
  const win = wx24();
  if(!win){ $('#sheet').innerHTML = `<h3>${title}</h3><p class="hint">${S.lang==='ko'?'날씨 정보를 불러오지 못했어요.':'Weather unavailable.'}</p>`; return; }
  const nowStr = ymd(new Date()), nowH = new Date().getHours();
  let lastDate = null, rows = '';
  for(const x of win){
    if(x.date !== lastDate){ lastDate = x.date; rows += `<div class="hDate">${wxDateLabel(x.date)}</div>`; }
    const w = wxInfo(x.code);
    const hl = S.lang==='ko' ? `${x.h}시` : `${String(x.h).padStart(2,'0')}:00`;
    const pop = (x.pop!=null && x.pop>0) ? `<span class="hPop">💧${x.pop}%</span>` : '';
    const now = (x.date===nowStr && x.h===nowH) ? 'now' : '';
    rows += `<div class="hRow ${now}">
      <span class="hH">${hl}</span><span class="hIco">${w.emoji}</span>
      <span class="hDesc">${w[S.lang]}</span>${pop}<span class="hT">${x.temp}°</span></div>`;
  }
  $('#sheet').innerHTML = `<h3>${title}</h3><div class="hourly">${rows}</div>`;
}

/* ---------- settings dialog (plain language, instant apply) ---------- */
function otherOf(w){ return w==='A' ? 'B' : 'A'; }
function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function nextWeekdayDate(wd){
  const n = new Date();
  const d = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  return addDays(d, mod(wd - d.getDay(), 7));
}
function nextBiweekly(cfg){
  const d1 = nextWeekdayDate(cfg.day);
  return mod(weekIndex(d1),2)===cfg.startWeek ? d1 : addDays(d1, 7);
}
function nextMonthly(cfg){
  const n = new Date();
  const t0 = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  let d = nthWeekday(t0.getFullYear(), t0.getMonth(), cfg.nth, cfg.day);
  if(d < t0) d = nthWeekday(t0.getFullYear(), t0.getMonth()+1, cfg.nth, cfg.day);
  return d;
}
function getPath(o, p){ return p.split('.').reduce((x,k)=>x[k], o); }
function setPath(o, p, v){
  const ks = p.split('.'); let x = o;
  for(let i=0; i<ks.length-1; i++) x = x[ks[i]];
  x[ks[ks.length-1]] = v;
}
/* user taps "next turn = OO" → derive internal first-owner so that date lands on OO */
function flipDerived(kind){
  if(kind==='mop'){
    const wi = weekIndex(nextWeekdayDate(S.mop.day));
    const nw = otherOf(pick(S.mop.first, wi));
    S.mop.first = mod(wi,2)===0 ? nw : otherOf(nw);
  }else if(kind==='bath'){
    const cfg = S.bathroomClean;
    const occ = Math.floor((weekIndex(nextBiweekly(cfg)) - cfg.startWeek)/2);
    const nw = otherOf(pick(cfg.first, occ));
    cfg.first = mod(occ,2)===0 ? nw : otherOf(nw);
  }else{
    const cfg = S.fridge;
    const mi = monthIndex(nextMonthly(cfg));
    const nw = otherOf(pick(cfg.first, mi));
    cfg.first = mod(mi,2)===0 ? nw : otherOf(nw);
  }
}

function pBtn(who, attrs){
  const p = S.people[who];
  return `<button class="chip tap" ${attrs}
    style="background:${p.color}1e;color:${p.color};border-color:${p.color}66">${esc(p.name)}</button>`;
}
function segBtns(k, opts, cur, extra){
  return `<span class="seg">` + opts.map(o=>
    `<button data-act="seg" data-k="${k}" data-v="${o.v}" ${extra||''}
      class="${String(o.v)===String(cur)?'on':''}">${o.label}</button>`).join('') + `</span>`;
}
function dSelFull(key, val){
  const wds = S.lang==='ko' ? WD_KO.map(w=>w+'요일') : WD_EN_FULL;
  return `<select data-sel="${key}">` +
    wds.map((w,i)=>`<option value="${i}" ${i===val?'selected':''}>${w}</option>`).join('') + `</select>`;
}
function nSelM(key, val){
  return `<select data-sel="${key}">` +
    NTH[S.lang].map((n,i)=>`<option value="${i+1}" ${i+1===val?'selected':''}>${n}</option>`).join('') + `</select>`;
}
function hSel(key, val){
  let opts = '';
  for(let h=0; h<24; h++){
    const label = S.lang==='ko' ? h+'시' : String(h).padStart(2,'0')+':00';
    opts += `<option value="${h}" ${h===val?'selected':''}>${label}</option>`;
  }
  return `<select data-sel="${key}">${opts}</select>`;
}

function renderSettingsBody(){
  const mopNext = nextWeekdayDate(S.mop.day);
  const mopWho = S.mop.mode==='fixed' ? S.mop.first : pick(S.mop.first, weekIndex(mopNext));
  const bath = S.bathroomClean;
  const bathNext = nextBiweekly(bath);
  const bathWho = pick(bath.first, Math.floor((weekIndex(bathNext) - bath.startWeek)/2));
  const bathC1 = nextWeekdayDate(bath.day), bathC2 = addDays(bathC1, 7);
  const bedC1 = nextWeekdayDate(S.bedding.day), bedC2 = addDays(bedC1, 7);
  const frNext = nextMonthly(S.fridge), frWho = pick(S.fridge.first, monthIndex(frNext));
  const wdsShort = S.lang==='ko' ? WD_KO : WD_EN;

  $('#dlg').innerHTML = `<div class="dlgIn">
    <h2>⚙️ ${t('settings')}</h2>
    <p class="subNote">${t('instantNote')} · ${t('tapNote')}</p>

    <div class="secCard">
      <div class="sec">${t('people')}</div>
      <div class="frow"><input type="text" data-inp="people.A.name" value="${esc(S.people.A.name)}">
        <input type="color" data-inp="people.A.color" value="${S.people.A.color}"></div>
      <div class="frow"><input type="text" data-inp="people.B.name" value="${esc(S.people.B.name)}">
        <input type="color" data-inp="people.B.color" value="${S.people.B.color}"></div>
    </div>

    <div class="secCard">
      <div class="sec">${t('dailyFixed')}</div>
      <div class="frow"><label>🗑️ ${CHORES.trashBathroom[S.lang]}</label>
        ${pBtn(S.daily.trashBathroom, `data-act="flip" data-path="daily.trashBathroom"`)}</div>
      <div class="frow"><label>♻️ ${CHORES.trashRecycle[S.lang]}</label>
        ${pBtn(S.daily.trashRecycle, `data-act="flip" data-path="daily.trashRecycle"`)}</div>
      <div class="frow"><label>🧹 ${CHORES.vacuum[S.lang]}</label>
        ${pBtn(S.daily.vacuum, `data-act="flip" data-path="daily.vacuum"`)}</div>
      <div class="frow"><label>🛌 ${CHORES.makeBed[S.lang]}</label>
        ${segBtns('daily.makeBed', [{v:'both',label:t('together')},{v:'A',label:esc(S.people.A.name)},{v:'B',label:esc(S.people.B.name)}], S.daily.makeBed)}</div>
    </div>

    <div class="secCard">
      <div class="sec">🧺 ${t('laundryS')}</div>
      <div class="frow"><label>${t('washDays')}</label>
        <span style="display:flex;gap:4px;flex-wrap:wrap;">${wdsShort.map((w,i)=>
          `<button class="dayb ${S.laundry.days.includes(i)?'on':''}" data-act="ld" data-v="${i}">${w}</button>`).join('')}</span></div>
      <div class="frow"><label>${t('owner')}</label>
        ${pBtn(S.laundry.owner, `data-act="flip" data-path="laundry.owner"`)}</div>
    </div>

    <div class="secCard">
      <div class="sec">🧽 ${t('mopS')}</div>
      <div class="frow"><label>${t('day')}</label>${dSelFull('mop.day', S.mop.day)}
        ${segBtns('mop.mode', [{v:'rotate',label:t('rotate')},{v:'fixed',label:t('fixed')}], S.mop.mode)}</div>
      <div class="frow"><label>${S.mop.mode==='fixed' ? t('owner') : t('nextTurn')+' · '+fmtShort(mopNext)}</label>
        ${S.mop.mode==='fixed'
          ? pBtn(S.mop.first, `data-act="flip" data-path="mop.first"`)
          : pBtn(mopWho, `data-act="flipd" data-kind="mop"`)}</div>
    </div>

    <div class="secCard">
      <div class="sec">🚽 ${t('bathS')}</div>
      <div class="frow"><label>${t('day')}</label>${dSelFull('bathroomClean.day', bath.day)}</div>
      <div class="frow"><label>${t('nextTurn')}</label>
        ${segBtns('bathroomClean.startWeek',
          [{v:mod(weekIndex(bathC1),2), label:fmtShort(bathC1)},
           {v:mod(weekIndex(bathC2),2), label:fmtShort(bathC2)}],
          bath.startWeek, 'data-num="1"')}</div>
      <div class="frow"><label>${t('owner')} · ${fmtShort(bathNext)}</label>
        ${pBtn(bathWho, `data-act="flipd" data-kind="bath"`)}</div>
    </div>

    <div class="secCard">
      <div class="sec">🛏️ ${t('bedS')}</div>
      <div class="frow"><label>${t('day')}</label>${dSelFull('bedding.day', S.bedding.day)}</div>
      <div class="frow"><label>${t('nextTurn')}</label>
        ${segBtns('bedding.startWeek',
          [{v:mod(weekIndex(bedC1),2), label:fmtShort(bedC1)},
           {v:mod(weekIndex(bedC2),2), label:fmtShort(bedC2)}],
          S.bedding.startWeek, 'data-num="1"')}</div>
    </div>

    <div class="secCard">
      <div class="sec">🧊 ${t('fridgeS')}</div>
      <div class="frow"><label>${t('monthPrefix')}</label>
        ${nSelM('fridge.nth', S.fridge.nth)} ${dSelFull('fridge.day', S.fridge.day)}</div>
      <div class="frow"><label>${t('nextTurn')} · ${fmtShort(frNext)}</label>
        ${pBtn(frWho, `data-act="flipd" data-kind="fridge"`)}</div>
    </div>

    <div class="secCard">
      <div class="sec">${t('display')}</div>
      <div class="frow"><label>${t('themeS')}</label>
        ${segBtns('theme',
          [{v:'auto',label:t('thAuto')},{v:'light',label:t('thLight')},{v:'dark',label:t('thDark')}],
          S.theme)}</div>
      <div class="frow"><label>${t('darkHours')}</label>
        ${hSel('darkStart', S.darkStart)} ~ ${hSel('darkEnd', S.darkEnd)}</div>
      <p class="help">${t('thAutoHelp')}</p>
      <div class="frow"><label>${t('sleepS')}</label>
        ${segBtns('sleep.on', [{v:1,label:t('onL')},{v:0,label:t('offL')}], S.sleep.on?1:0, 'data-bool="1"')}
        ${hSel('sleep.start', S.sleep.start)} ~ ${hSel('sleep.end', S.sleep.end)}</div>
      <p class="help">${t('sleepHelp')}</p>
    </div>

    <div class="dlgBtns">
      <button class="primary" data-act="close">${t('close')}</button>
    </div>
    <button class="resetLink" data-act="reset">${t('reset')}</button>
  </div>`;
}
function commitSettings(){ saveSettings(); renderAll(); renderSettingsBody(); }
function openSettings(){ renderSettingsBody(); $('#dlg').showModal(); }
$('#btnSet').onclick = openSettings;

$('#dlg').addEventListener('click', e=>{
  if(e.target === e.currentTarget){ $('#dlg').close(); return; }  // 바깥(백드롭) 클릭 → 닫기 (변경은 이미 저장됨)
  const b = e.target.closest('[data-act]');
  if(!b) return;
  const act = b.dataset.act;
  if(act==='close'){ $('#dlg').close(); return; }
  if(act==='reset'){
    if(confirm(t('resetQ'))){
      localStorage.removeItem('chores-settings-v2');
      S = loadSettings();
      commitSettings();
    }
    return;
  }
  if(act==='flip'){ setPath(S, b.dataset.path, otherOf(getPath(S, b.dataset.path))); commitSettings(); }
  else if(act==='flipd'){ flipDerived(b.dataset.kind); commitSettings(); }
  else if(act==='seg'){
    let v = b.dataset.v;
    if(b.dataset.num) v = Number(v);
    if(b.dataset.bool) v = v==='1';
    setPath(S, b.dataset.k, v);
    commitSettings();
  }
  else if(act==='ld'){
    const v = Number(b.dataset.v);
    if(S.laundry.days.includes(v)){
      if(S.laundry.days.length > 1) S.laundry.days = S.laundry.days.filter(x=>x!==v);
    }else{
      S.laundry.days.push(v);
      S.laundry.days.sort((a,b2)=>a-b2);
    }
    commitSettings();
  }
});
$('#dlg').addEventListener('change', e=>{
  const el = e.target;
  if(el.dataset && el.dataset.sel){ setPath(S, el.dataset.sel, Number(el.value)); commitSettings(); }
  else if(el.dataset && el.dataset.inp){
    let v = el.value;
    if(el.dataset.inp.endsWith('.name')) v = v.trim() || '?';
    setPath(S, el.dataset.inp, v);
    commitSettings();
  }
});

renderAll();
</script>
</body>
</html>
